<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #1a1410; --paper: #f5f0e8; --aged: #e8dfc8; --rust: #b5451b; --gold: #c8973a; --muted: #8a7f6e; --light-ink: #3d3228; }
  body { background: var(--paper); color: var(--ink); font-family: 'DM Serif Display', serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; position: relative; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,0.015) 28px, rgba(0,0,0,0.015) 29px), repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(0,0,0,0.008) 28px, rgba(0,0,0,0.008) 29px); pointer-events: none; }
  header { text-align: center; margin-bottom: 24px; }
  .title-ko { font-family: 'Noto Serif KR', serif; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 700; letter-spacing: -0.02em; color: var(--ink); line-height: 1; }
  .title-en { font-family: 'DM Serif Display', serif; font-style: italic; font-size: clamp(0.9rem, 2vw, 1.1rem); color: var(--muted); margin-top: 6px; letter-spacing: 0.08em; }
  .divider { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, var(--rust), transparent); margin: 16px auto; }
  .direction-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em; }
  .direction-row span { color: var(--muted); }
  .toggle-wrap { display: flex; border: 1.5px solid var(--ink); border-radius: 2px; overflow: hidden; }
  .toggle-btn { padding: 6px 14px; background: transparent; color: var(--muted); border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.15s; }
  .toggle-btn:first-child { border-right: 1.5px solid var(--ink); }
  .toggle-btn.active { background: var(--ink); color: var(--paper); }
  .categories { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
  .cat-btn { font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 16px; border: 1.5px solid var(--muted); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; border-radius: 2px; }
  .cat-btn:hover { border-color: var(--ink); color: var(--ink); }
  .cat-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .card-area { width: 100%; max-width: 520px; margin-bottom: 16px; position: relative; }
  .swipe-label { position: absolute; top: 50%; transform: translateY(-50%); font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0; pointer-events: none; z-index: 10; }
  .swipe-label.left { left: 12px; color: var(--rust); }
  .swipe-label.right { right: 12px; color: #4a7c59; }
  .card-scene { width: 100%; perspective: 1200px; }
  .card-inner { position: relative; width: 100%; height: 320px; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1); cursor: pointer; user-select: none; }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border: 2px solid var(--ink); background: var(--paper); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; border-radius: 4px; box-shadow: 6px 6px 0 var(--aged), 12px 12px 0 rgba(0,0,0,0.06); }
  .card-face.back { transform: rotateY(180deg); background: var(--aged); }
  .card-face::before, .card-face::after { content: '◆'; position: absolute; font-size: 0.5rem; color: var(--gold); opacity: 0.6; }
  .card-face::before { top: 12px; left: 16px; }
  .card-face::after { bottom: 12px; right: 16px; }
  .card-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); position: absolute; top: 16px; }
  .card-hangul { font-family: 'Noto Serif KR', serif; font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 700; line-height: 1.2; color: var(--ink); text-align: center; }
  .card-roman { font-family: 'DM Mono', monospace; font-size: 0.9rem; color: var(--rust); margin-top: 12px; letter-spacing: 0.05em; text-align: center; }
  .card-english { font-family: 'DM Serif Display', serif; font-size: clamp(1.4rem, 4vw, 2rem); color: var(--ink); text-align: center; line-height: 1.3; }
  .card-example { font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; font-weight: 300; color: var(--light-ink); margin-top: 16px; text-align: center; line-height: 1.6; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 12px; width: 100%; }
  .card-example .ex-ko { font-size: 0.9rem; font-weight: 400; }
  .hint { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-align: center; margin-bottom: 24px; opacity: 0.7; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 32px; }
  .btn { font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 24px; border: 2px solid var(--ink); background: transparent; color: var(--ink); cursor: pointer; transition: all 0.15s; border-radius: 2px; }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn.primary { background: var(--ink); color: var(--paper); }
  .btn.primary:hover { background: var(--rust); border-color: var(--rust); }
  .btn.correct { border-color: #4a7c59; color: #4a7c59; }
  .btn.correct:hover { background: #4a7c59; color: var(--paper); }
  .btn.wrong { border-color: var(--rust); color: var(--rust); }
  .btn.wrong:hover { background: var(--rust); color: var(--paper); }
  .progress-bar { width: 100%; max-width: 520px; height: 3px; background: var(--aged); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--rust), var(--gold)); transition: width 0.4s ease; border-radius: 2px; }
  .stats { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; display: flex; gap: 24px; margin-bottom: 40px; }
  .stats span { color: var(--ink); }
  .score-panel { display: none; flex-direction: column; align-items: center; gap: 16px; text-align: center; padding: 40px; border: 2px solid var(--ink); max-width: 520px; width: 100%; background: var(--aged); box-shadow: 8px 8px 0 rgba(0,0,0,0.08); }
  .score-panel.visible { display: flex; }
  .score-big { font-family: 'Noto Serif KR', serif; font-size: 4rem; font-weight: 700; color: var(--rust); }
  .score-label { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 1.3rem; color: var(--muted); }
  .card-counter { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); letter-spacing: 0.08em; }
</style>
</head>
<body>
<header>
  <div class="title-ko">한국어 카드</div>
  <div class="title-en">Korean Flashcards</div>
  <div class="divider"></div>
</header>
<div class="direction-row">
  <span>Show first:</span>
  <div class="toggle-wrap">
    <button class="toggle-btn active" id="btnKoFirst" onclick="setDirection('ko')">🇰🇷 Korean</button>
    <button class="toggle-btn" id="btnEnFirst" onclick="setDirection('en')">🇬🇧 English</button>
  </div>
</div>
<div class="categories" id="categories"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="stats">
  <div>Card <span id="cardNum">1</span> / <span id="cardTotal">1</span></div>
  <div>✓ <span id="correctCount">0</span></div>
  <div>✗ <span id="wrongCount">0</span></div>
</div>
<div class="card-area" id="cardArea">
  <div class="swipe-label left" id="swipeLabelLeft">✗ Again</div>
  <div class="swipe-label right" id="swipeLabelRight">✓ Got it</div>
  <div class="card-scene">
    <div class="card-inner" id="cardInner">
      <div class="card-face front">
        <div class="card-label" id="frontLabel">Korean</div>
        <div id="frontContent"></div>
      </div>
      <div class="card-face back">
        <div class="card-label" id="backLabel">English</div>
        <div id="backContent"></div>
        <div class="card-example" id="backExample"></div>
      </div>
    </div>
  </div>
</div>
<div class="hint" id="hintText">tap to reveal · swipe right ✓ · swipe left ✗</div>
<div class="controls" id="controls">
  <button class="btn wrong" onclick="markWrong()">✗ Again</button>
  <button class="btn primary" onclick="flipCard()">Flip</button>
  <button class="btn correct" onclick="markCorrect()">✓ Got it</button>
</div>
<div class="score-panel" id="scorePanel">
  <div class="score-big" id="scoreBig">—</div>
  <div class="score-label">Well done, 잘했어요!</div>
  <div style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted);letter-spacing:0.08em" id="scoreDetail"></div>
  <button class="btn primary" onclick="restart()" style="margin-top:8px">Restart deck</button>
</div>
<script src="../shared/logger.js"></script>
<script>

    { ko: "만나다", rom: "mannada", en: "To meet", ex: { ko: "친구를 만나요.", en: "I meet a friend." } },
    { ko: "차다", rom: "chada", en: "To kick", ex: { ko: "공을 차요.", en: "I kick the ball." } },
    { ko: "보다", rom: "boda", en: "To watch / see", ex: { ko: "영화를 봐요.", en: "I watch a movie." } },
    { ko: "배우다", rom: "baeuda", en: "To learn", ex: { ko: "한국어를 배워요.", en: "I learn Korean." } },
    { ko: "공부하다", rom: "gongbu hada", en: "To study", ex: { ko: "카페에서 공부해요.", en: "I study at the café." } },
    { ko: "바쁘다", rom: "bappeuda", en: "To be busy", ex: { ko: "요즘 너무 바빠요.", en: "I'm very busy these days." } },
    { ko: "일하다", rom: "ilhada", en: "To work", ex: { ko: "회사에서 일해요.", en: "I work at the office." } },

  transport: { label: "교통 Transport", cards: [
    { ko: "자동차", rom: "jadongcha", en: "Car", ex: { ko: "자동차로 가요.", en: "I go by car." } },
    { ko: "주차장", rom: "juchajang", en: "Car park", ex: { ko: "주차장이 어디에요?", en: "Where is the car park?" } },
    { ko: "지하철", rom: "jihacheol", en: "Subway", ex: { ko: "지하철을 타요.", en: "I take the subway." } },
    { ko: "타다", rom: "tada", en: "To ride / take", ex: { ko: "버스를 타요.", en: "I take the bus." } },

    { ko: "비행기", rom: "bihaenggi", en: "Airplane", ex: { ko: "비행기를 타요.", en: "I take the airplane." } },

    { ko: "지하철로 출근해요", rom: "jihacheolro chulgeunhaeyo", en: "I commute to work by subway", ex: { ko: "저는 매일 지하철로 출근해요.", en: "I commute to work by subway every day." } },
  ]},

let currentDeck = 'greetings', currentCards = [], currentIndex = 0;
let isFlipped = false, correct = 0, wrong = 0;
let direction = 'ko';

function setDirection(dir) {
  direction = dir;
  document.getElementById('btnKoFirst').classList.toggle('active', dir === 'ko');
  document.getElementById('btnEnFirst').classList.toggle('active', dir === 'en');
  showCard();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadDeck(key) {
  currentDeck = key; currentCards = shuffle(decks[key].cards);
  currentIndex = 0; correct = 0; wrong = 0; isFlipped = false;
  const ci = document.getElementById('cardInner');
  ci.style.transition = 'none'; ci.style.transform = ''; ci.style.opacity = '1';
  ci.classList.remove('flipped');
  setTimeout(() => { ci.style.transition = ''; }, 50);
  document.getElementById('scorePanel').classList.remove('visible');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('controls').style.display = '';
  document.getElementById('hintText').style.display = '';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.deck === key));
  showCard();
}

function renderKorean(card, container) {
  container.innerHTML = '';
  const h = document.createElement('div'); h.className = 'card-hangul'; h.textContent = card.ko;
  const r = document.createElement('div'); r.className = 'card-roman'; r.textContent = card.rom;
  const ctr = document.createElement('div'); ctr.className = 'card-counter';
  ctr.textContent = `${currentIndex + 1} / ${currentCards.length}`;
  container.appendChild(h); container.appendChild(r); container.appendChild(ctr);
}

function renderEnglish(card, container) {
  container.innerHTML = '';
  const e = document.createElement('div'); e.className = 'card-english'; e.textContent = card.en;
  const ctr = document.createElement('div'); ctr.className = 'card-counter';
  ctr.textContent = `${currentIndex + 1} / ${currentCards.length}`;
  container.appendChild(e); container.appendChild(ctr);
}

function showCard() {
  const card = currentCards[currentIndex];
  isFlipped = false;
  const ci = document.getElementById('cardInner');
  ci.style.transition = 'none'; ci.style.transform = ''; ci.style.opacity = '1';
  ci.classList.remove('flipped');
  setTimeout(() => { ci.style.transition = ''; }, 50);

  const frontContent = document.getElementById('frontContent');
  const backContent = document.getElementById('backContent');

  if (direction === 'ko') {
    document.getElementById('frontLabel').textContent = 'Korean';
    document.getElementById('backLabel').textContent = 'English';
    renderKorean(card, frontContent);
    renderEnglish(card, backContent);
  } else {
    document.getElementById('frontLabel').textContent = 'English';
    document.getElementById('backLabel').textContent = 'Korean';
    renderEnglish(card, frontContent);
    renderKorean(card, backContent);
  }

  document.getElementById('backExample').innerHTML = card.ex
    ? `<span class="ex-ko">${card.ex.ko}</span><br><em>${card.ex.en}</em>` : '';
  document.getElementById('cardNum').textContent = currentIndex + 1;
  document.getElementById('cardTotal').textContent = currentCards.length;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('progressFill').style.width = (currentIndex / currentCards.length * 100) + '%';
  document.getElementById('hintText').textContent = 'tap to reveal · swipe right ✓ · swipe left ✗';
  document.getElementById('swipeLabelLeft').style.opacity = 0;
  document.getElementById('swipeLabelRight').style.opacity = 0;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
}

function markCorrect() { correct++; animateOut(1); }
function markWrong() { wrong++; animateOut(-1); }

function animateOut(dir) {
  const ci = document.getElementById('cardInner');
  ci.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
  ci.style.transform = `translateX(${dir * 450}px) rotate(${dir * 15}deg)`;
  ci.style.opacity = '0';
  setTimeout(() => { currentIndex++; if (currentIndex >= currentCards.length) showScore(); else showCard(); }, 300);
}

function showScore() {
  try { KoreanSuiteLogger.log('flashcards', { deckId: currentDeck, events: [{ type: 'session_complete', correct: correct, wrong: wrong, total: currentCards.length, direction: direction }] }); } catch(e){}
  const pct = Math.round((correct / currentCards.length) * 100);
  document.getElementById('scoreBig').textContent = pct + '%';
  document.getElementById('scoreDetail').textContent = `${correct} correct · ${wrong} incorrect · ${currentCards.length} total`;
  document.getElementById('scorePanel').classList.add('visible');
  document.getElementById('cardArea').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('hintText').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
}

function restart() { loadDeck(currentDeck); }

const cardArea = document.getElementById('cardArea');
const labelL = document.getElementById('swipeLabelLeft');
const labelR = document.getElementById('swipeLabelRight');
const SWIPE_THRESHOLD = 80;
let startX = 0, dragX = 0, dragging = false, didSwipe = false;

function onMove(x) {
  dragX = x - startX;
  const ci = document.getElementById('cardInner');
  ci.style.transition = 'none';
  const rot = dragX * 0.06;
  ci.style.transform = isFlipped ? `rotateY(180deg) translateX(${-dragX}px) rotate(${-rot}deg)` : `translateX(${dragX}px) rotate(${rot}deg)`;
  const ratio = Math.min(Math.abs(dragX) / SWIPE_THRESHOLD, 1);
  labelL.style.opacity = dragX < 0 ? ratio : 0;
  labelR.style.opacity = dragX > 0 ? ratio : 0;
  if (Math.abs(dragX) > 10) didSwipe = true;
}

function onEnd() {
  if (!dragging) return;
  dragging = false;
  if (!didSwipe) {
    resetCard(); flipCard();
  } else if (Math.abs(dragX) >= SWIPE_THRESHOLD) {
    const dir = dragX > 0 ? 1 : -1;
    const ci = document.getElementById('cardInner');
    ci.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
    ci.style.transform = `translateX(${dir * 500}px) rotate(${dir * 20}deg)`;
    ci.style.opacity = '0';
    labelL.style.opacity = 0; labelR.style.opacity = 0;
    setTimeout(() => { currentIndex++; if (dir > 0) correct++; else wrong++; if (currentIndex >= currentCards.length) showScore(); else showCard(); }, 260);
  } else { resetCard(); }
}

function resetCard() {
  const ci = document.getElementById('cardInner');
  ci.style.transition = 'transform 0.3s ease';
  ci.style.transform = isFlipped ? 'rotateY(180deg)' : '';
  labelL.style.opacity = 0; labelR.style.opacity = 0;
}

cardArea.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dragX = 0; dragging = true; didSwipe = false; }, { passive: true });
cardArea.addEventListener('touchmove', e => { if (dragging) onMove(e.touches[0].clientX); }, { passive: true });
cardArea.addEventListener('touchend', onEnd);
cardArea.addEventListener('mousedown', e => { startX = e.clientX; dragX = 0; dragging = true; didSwipe = false; });
window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX); });
window.addEventListener('mouseup', onEnd);

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight' || e.key === '1') markCorrect();
  if (e.key === 'ArrowLeft'  || e.key === '2') markWrong();
});

const catContainer = document.getElementById('categories');
Object.entries(decks).forEach(([key, deck]) => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (key === currentDeck ? ' active' : '');
  btn.dataset.deck = key; btn.textContent = deck.label;
  btn.onclick = () => loadDeck(key);
  catContainer.appendChild(btn);
});

loadDeck('greetings');
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Korean Suite</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; padding: calc(env(safe-area-inset-top) + 32px) 16px calc(env(safe-area-inset-bottom) + 32px); }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .subtitle { color: #777; font-size: 14px; margin-bottom: 32px; }
    .grid { display: grid; gap: 12px; width: 100%; max-width: 380px; }
    .card {
      display: block;
      padding: 18px 20px;
      background: #ffffff;
      border: 1px solid #e8dfcc;
      border-radius: 12px;
      text-decoration: none;
      color: #1a2520;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px rgba(60,40,20,0.08);
    }
    .card:hover { border-color: #c4452d; }
    .card h2 { margin: 0 0 4px; font-size: 17px; font-weight: 600; }
    .card p { margin: 0; color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>한국어 Suite</h1>
  <p class="subtitle">Simon's Korean learning apps</p>
  <div class="grid">
    <a class="card" href="flashcards/">
      <h2>Flashcards</h2>
      <p>Vocabulary reference — flip cards, bilingual, multi-deck</p>
    </a>
    <a class="card" href="drill/">
      <h2>Daily Drill</h2>
      <p>Fast repetition</p>
    </a>
    <a class="card" href="seoul/">
      <h2>Seoul Situations</h2>
      <p>Conversational phrases for daily life</p>
    </a>
    <a class="card" href="listening/">
      <h2>Listening Match</h2>
      <p>Listening comprehension</p>
    </a>
  </div>
</body>
</html>
